<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 2 190 196" width="200" height="200">
  <defs>
    <!-- Arrowheads (all ~20% larger than original) -->
    <marker id="arrow-implicit" markerWidth="13" markerHeight="10" refX="13" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L13,5 L0,10 Z" fill="#9558B2"/>
    </marker>
    <marker id="arrow-explicit" markerWidth="13" markerHeight="10" refX="13" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L13,5 L0,10 Z" fill="#CB3C33"/>
    </marker>
    <marker id="arrow-axis" markerWidth="11" markerHeight="8.5" refX="0" refY="4.25"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L11,4.25 L0,8.5 Z" fill="#005691"/>
    </marker>
    <marker id="arrow-rk1" markerWidth="5" markerHeight="3.6" refX="5" refY="1.8"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L5,1.8 L0,3.6 Z" fill="#4063D8"/>
    </marker>
    <marker id="arrow-rk2" markerWidth="5" markerHeight="3.6" refX="5" refY="1.8"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L5,1.8 L0,3.6 Z" fill="#389826"/>
    </marker>
    <marker id="arrow-rk3" markerWidth="5" markerHeight="3.6" refX="5" refY="1.8"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L5,1.8 L0,3.6 Z" fill="#CB3C33"/>
    </marker>
  </defs>

  <!-- Time axis -->
  <line x1="8" y1="100" x2="188" y2="100"
        stroke="#005691" stroke-width="2.5" marker-end="url(#arrow-axis)"/>

  <!-- Tick at t -->
  <line x1="25" y1="92" x2="25" y2="108" stroke="#005691" stroke-width="2.5"/>
  <text x="25" y="128" text-anchor="middle"
        font-family="sans-serif" font-size="20" font-weight="bold" fill="#333">t</text>

  <!-- Tick at t+Δt -->
  <line x1="168" y1="92" x2="168" y2="108" stroke="#005691" stroke-width="2.5"/>
  <text x="168" y="128" text-anchor="middle"
        font-family="sans-serif" font-size="17" font-weight="bold" fill="#333">t+Δt</text>

  <!-- Explicit arc (above axis, t → t+Δt) -->
  <path d="M 25,100 A 74,80 0 0,1 168,100"
        stroke="#CB3C33" stroke-width="3" fill="none"/>
  <!-- Arrowhead at the arc apex (~96.5, 41) where tangent is horizontal-right -->
  <line x1="98" y1="41" x2="99" y2="41"
        stroke-opacity="0" stroke-width="3"
        marker-end="url(#arrow-explicit)"/>

  <!-- RK sub-stage arcs (on the axis, arcing upward) -->
  <path d="M 25,100 A 26,34 0 0,1 73,100"
        stroke="#4063D8" stroke-width="2" fill="none"
        marker-end="url(#arrow-rk1)"/>
  <path d="M 73,100 A 26,34 0 0,1 120,100"
        stroke="#389826" stroke-width="2" fill="none"
        marker-end="url(#arrow-rk2)"/>
  <path d="M 120,100 A 26,34 0 0,1 168,100"
        stroke="#CB3C33" stroke-width="2" fill="none"
        marker-end="url(#arrow-rk3)"/>

  <!-- Implicit arc (below axis, dashed purple) -->
  <path d="M 165,135 A 74,72 0 0,1 28,135"
        stroke="#9558B2" stroke-width="3" fill="none"
        stroke-dasharray="8,4"/>
  <!-- Arrowhead at the arc bottom apex (~96.5, 180) where tangent is horizontal-left -->
  <line x1="95" y1="180" x2="94" y2="180"
        stroke-opacity="0" stroke-width="3"
        marker-end="url(#arrow-implicit)"/>
</svg>