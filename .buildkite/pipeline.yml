agents:
  queue: central
  slurm_mem: 8G
  modules: climacommon/2024_10_08

env:
  JULIA_LOAD_PATH: "${JULIA_LOAD_PATH}:${BUILDKITE_BUILD_CHECKOUT_PATH}/.buildkite"
  OPENBLAS_NUM_THREADS: 1
  JULIA_NVTX_CALLBACKS: gc
  OMPI_MCA_opal_warn_on_missing_libcuda: 0
  JULIA_MAX_NUM_PRECOMPILE_FILES: 100

steps:
  - label: "init cpu env"
    key: "init_cpu_env"
    command:

      - echo "--- Instantiate buildkite"
      - "julia --project=.buildkite -e 'using Pkg; Pkg.instantiate(;verbose=true); Pkg.precompile(;strict=true)'"

      - echo "--- Package status"
      - "julia --project -e 'using Pkg; Pkg.status()'"


  - label: "init gpu env"
    key: "init_gpu_env"
    command:
      - echo "--- Configure MPI"
      - julia -e 'using Pkg; Pkg.add("MPIPreferences"); using MPIPreferences; use_system_binary()'

      - echo "--- Instantiate project"
      - "julia --project -e 'using Pkg; Pkg.instantiate(;verbose=true); Pkg.precompile(;strict=true)'"

      - echo "--- Instantiate test"
      - "julia --project=.buildkite -e 'using Pkg; Pkg.develop(path=\".\"); Pkg.instantiate(;verbose=true); Pkg.precompile()'"

      - echo "--- Initialize CUDA runtime"
      - "julia --project -e 'using CUDA; CUDA.precompile_runtime(); CUDA.versioninfo()'"

      - echo "--- Package status"
      - "julia --project -e 'using Pkg; Pkg.status()'"
    agents:
      slurm_gres: "gpu:1"

  - wait

  # ================================================================== #
  # Unit tests (fast, no convergence studies)
  # ================================================================== #
  - group: "Unit tests"
    key: unit_tests
    steps:

      - label: "unit: sparse_containers"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/sparse_containers.jl"

      - label: "unit: fused_increment"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/fused_increment.jl"

      - label: "unit: tableaus"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/tableaus.jl"

      - label: "unit: update_signal_handler"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/update_signal_handler.jl"

      - label: "unit: line_search"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/line_search.jl"

      - label: "unit: convergence_checker"
        command: "julia --project=.buildkite --check-bounds=yes test/utils/convergence_checker.jl"

      - label: "unit: forward_euler"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/forward_euler.jl"

      - label: "unit: incrementing_ode"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/incrementing_ode.jl"

      - label: "unit: edge_cases"
        command: "julia --project=.buildkite --check-bounds=yes test/unit/edge_cases.jl"

      - label: "unit: aqua"
        command: "julia --project=.buildkite --check-bounds=yes test/aqua.jl"

  # ================================================================== #
  # Solver correctness
  # ================================================================== #
  - group: "Solver correctness"
    key: solver_correctness
    steps:

      - label: "solver: newtons_method"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/newtons_method.jl"

  # ================================================================== #
  # Integration / system-level tests
  # ================================================================== #
  - group: "Integration tests"
    key: integration_tests
    steps:

      - label: "integration: single_column_ars"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/single_column_ars.jl"

      - label: "integration: callbacks (CPU)"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/callbacks.jl"

      - label: "integration: callbacks (MPI)"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/callbacks.jl"
        env:
          CLIMACOMMS_CONTEXT: "MPI"

      - label: "integration: integrator"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/integrator.jl"

      - label: "integration: limiter"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/limiter.jl"

      - label: "integration: second_newton"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/second_newton.jl"

      - label: "integration: ssp_monotonicity"
        command: "julia --project=.buildkite --check-bounds=yes test/integration/ssp_monotonicity.jl"

  # ================================================================== #
  # Performance / allocation tests
  # ================================================================== #
  - group: "Performance tests"
    key: performance_tests
    steps:

      - label: "perf: type_stability"
        command: "julia --project=.buildkite --check-bounds=yes test/performance/type_stability.jl"

      - label: "perf: allocations"
        command: "julia --project=.buildkite --check-bounds=yes test/performance/allocations.jl"

  # ================================================================== #
  # Convergence order tests (parallelized across solvers)
  # ================================================================== #
  - group: "Convergence tests"
    key: convergence_tests
    steps:

      - label: "conv: explicit_rk"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/explicit_rk.jl"

      - label: "conv: lsrk"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/lsrk.jl"

      - label: "conv: multirate"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/multirate.jl"

      - label: "conv: rosenbrock"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/rosenbrock.jl"

      - label: "conv: imex_ssprk"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/imex_ssprk.jl"

      - label: "conv: imex_ark"
        command: "julia --project=.buildkite --check-bounds=yes test/solvers/imex_ark.jl"

  # ================================================================== #
  # GPU tests
  # ================================================================== #
  - group: "GPU tests"
    key: gpu_tests
    steps:

      - label: "GPU: runtests"
        command: "julia --project=.buildkite --check-bounds=yes test/runtests.jl CuArray"
        artifact_paths: "output/*"
        agents:
          slurm_gres: "gpu:1"

  # ================================================================== #
  # Profiling / benchmarks
  # ================================================================== #
  - group: "Profiling"
    key: profiling
    steps:

      - label: "Perf: Flame graph (1D diffusion)"
        command: "julia --project=.buildkite perf/flame.jl --job_id diffusion_1D"
        artifact_paths: "diffusion_1D/*"

      - label: "Perf: Jet graph (ode fun)"
        command: "julia --project=.buildkite perf/jet.jl --problem ode_fun"

      - label: "Perf: Jet (forward euler)"
        command: "julia --project=.buildkite perf/jet.jl --problem fe"

      - label: "Perf: Jet (clima diffusion 2D)"
        command: "julia --project=.buildkite perf/jet.jl --problem diffusion2d"

      - label: "Perf: Benchmark"
        command: "julia --project=.buildkite perf/benchmark.jl"
